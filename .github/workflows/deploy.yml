name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Node.js tests ─────────────────────────────────────────
  test-node:
    name: Node.js Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devtrack
          POSTGRES_PASSWORD: devtrack
          POSTGRES_DB: devtrack_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U devtrack"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://devtrack:devtrack@localhost:5432/devtrack_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_test_secret_not_for_production
      JWT_EXPIRES_IN: 1h
      AGENTS_SERVICE_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run tests
        run: npm test

  # ── Python agent tests ────────────────────────────────────
  test-python:
    name: Python Agent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run agent tests
        env:
          # Tests mock _get_llm — no real API calls — but Settings still validates
          LLM_PROVIDER: groq
          GROQ_API_KEY: gsk_placeholder_for_ci_tests_only
          LOG_LEVEL: WARNING
        run: pytest tests/ -v --tb=short

  # ── Deploy to Render (main branch only, after tests pass) ─
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test-node, test-python]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail-with-body
